            <circle cx="39" cy="31.5" r="1.5" fill="#fca5a5" opacity="0.65"/>
            <ellipse cx="30" cy="46.5" rx="7" ry="5.5" fill="#a16207"/>
            <ellipse cx="30" cy="44.5" rx="3.2" ry="2.8" fill="#dc2626"/>
            <line x1="13" y1="44" x2="23" y2="46" stroke="#fde68a" stroke-width="0.9" stroke-linecap="round"/>
            <line x1="13" y1="47.5" x2="23" y2="47.5" stroke="#fde68a" stroke-width="0.9" stroke-linecap="round"/>
            <line x1="47" y1="44" x2="37" y2="46" stroke="#fde68a" stroke-width="0.9" stroke-linecap="round"/>
            <line x1="47" y1="47.5" x2="37" y2="47.5" stroke="#fde68a" stroke-width="0.9" stroke-linecap="round"/>
            <path d="M30 9 L31.8 12.5 L35.5 11.5 L33 15 L36.5 17.5 L32 16.5 L30 20.5 L28 16.5 L23.5 17.5 L27 15 L24.5 11.5 L28.2 12.5 Z" fill="white" opacity="0.9"/>
            <rect x="46" y="38" width="12" height="4" rx="1.5" fill="#475569"/>
            <rect x="55" y="35.5" width="3.5" height="3" rx="0.5" fill="#334155"/>
            <rect x="47" y="41.5" width="5" height="2.5" rx="1" fill="#64748b"/>
          </svg></div>
          <div class="ht-brand">
            <h1>GALAKTOTEK s.r.o.</h1>
            <p class="tagline">Ochrana pred krtky zemskymi i galaktickymi &mdash; <span class="web">GalaktoKrtek.cz</span></p>
            <p class="address">Hvezdna 42, 370 01 Ceske Budejovice &bull; IC: 09987654 &bull; DIC: CZ09987654</p>
          </div>
          <div class="ht-meta">
            <strong>{{ quoteNumber }}</strong>
            Datum: {{ date }}<br/>
            Platnost do: {{ validUntil }}<br/>
            Tel.: +420 777 GS-4200
          </div>
        </div>

        {% if noConfig %}
        <div class="ht-empty">
          Otevrte kalkulator &laquo;Ochrana pred krtky&raquo;, vyplnte variantu a zakreslete prvky na vykres.
        </div>
        {% else %}

        <div class="ht-client">
          <strong>{{ clientName }}</strong>
          <span>{{ propertyAddress }}</span>
        </div>

        <div class="ht-kpis">
          <div class="ht-kpi">
            <span class="dot-g">Plocha zahrady</span>
            <strong>{{ gardenAreaStr }} m&sup2;</strong>
          </div>
          <div class="ht-kpi">
            <span>Krtincu</span>
            <strong>{{ moundCount }}</strong>
          </div>
          <div class="ht-kpi">
            <span class="dot-b">Zarizeni celkem</span>
            <strong>{{ deviceCount }}</strong>
          </div>
        </div>

        {% if repellerLines | length > 0 %}
        <div class="ht-section">Plasice krtku <span class="dot-o">&bull;</span></div>
        <table class="ht-table">
          <thead><tr><th>Polozka</th><th class="r">Ks</th><th class="r">Kc/ks</th><th class="r">Celkem Kc</th></tr></thead>
          <tbody>
            {% for r in repellerLines %}
            <tr><td>{{ r.item }}</td><td class="r">{{ r.qty }}</td><td class="r">{{ r.unitPrice }}</td><td class="r">{{ r.price }}</td></tr>
            {% endfor %}
          </tbody>
        </table>
        {% endif %}

        {% if floodLines | length > 0 %}
        <div class="ht-section">Automaticke zaplaveni krtincu <span class="dot-b">&bull;</span></div>
        <table class="ht-table">
          <thead><tr><th>Polozka</th><th class="r">Ks</th><th class="r">Kc/ks</th><th class="r">Celkem Kc</th></tr></thead>
          <tbody>
            {% for r in floodLines %}
            <tr><td>{{ r.item }}</td><td class="r">{{ r.qty }}</td><td class="r">{{ r.unitPrice }}</td><td class="r">{{ r.price }}</td></tr>
            {% endfor %}
          </tbody>
        </table>
        {% endif %}

        {% if barrierLines | length > 0 %}
        <div class="ht-section">Barierova sit</div>
        <table class="ht-table">
          <thead><tr><th>Polozka</th><th class="r">Mn.</th><th class="r">Kc/j</th><th class="r">Celkem Kc</th></tr></thead>
          <tbody>
            {% for r in barrierLines %}
            <tr><td>{{ r.item }}</td><td class="r">{{ r.qty }} {{ r.unit }}</td><td class="r">{{ r.unitPrice }}</td><td class="r">{{ r.price }}</td></tr>
            {% endfor %}
          </tbody>
        </table>
        {% endif %}

        {% if serviceLines | length > 0 %}
        <div class="ht-section">Sluzby a instalace</div>
        <table class="ht-table">
          <thead><tr><th>Sluzba</th><th class="r">Mn.</th><th class="r">Kc/j</th><th class="r">Celkem Kc</th></tr></thead>
          <tbody>
            {% for r in serviceLines %}
            <tr><td>{{ r.item }}</td><td class="r">{{ r.qty }}</td><td class="r">{{ r.unitPrice }}</td><td class="r">{{ r.price }}</td></tr>
            {% endfor %}
          </tbody>
        </table>
        {% endif %}

        <div class="ht-totals">
          <div class="ht-trow"><span>Mezisoucet bez DPH</span><span>{{ subtotalStr }} Kc</span></div>
          <div class="ht-trow"><span>DPH 21 %</span><span>{{ vatStr }} Kc</span></div>
          <div class="ht-trow grand"><span>CELKEM S DPH</span><span>{{ totalStr }} Kc</span></div>
        </div>

        <div class="ht-sign">
          <div>Za GALAKTOTEK s.r.o.<br/>&nbsp;<br/>Kpt. Tomas Vesmirny, jednatel</div>
          <div>Objednatel<br/>&nbsp;<br/>{{ clientName }}</div>
        </div>

        {% endif %}

        <div class="ht-footer">
          GALAKTOTEK s.r.o. &bull; Hvezdna 42, 370 01 Ceske Budejovice &bull; IC: 09987654<br/>
          Zapsana v OR u Krajskeho soudu v CB, oddil C, vlozka 45987 &bull; www.GalaktoKrtek.cz<br/>
          <em>Autorizovany distributor NovaStar Defense Systems &bull; Certifikat ISO-9001 &amp; Galakticky standard GS-42 &bull; Neposkytujeme zaruku pro krtky s kvantovymi schopnostmi.</em>
        </div>
      </div>
    body: |
      var pid = projectId;
      var configs   = (models.MoleProtConfig  || []).filter(function(r){ return r.project_id === pid; });
      var zones     = (models.GardenZone      || []).filter(function(r){ return r.project_id === pid; });
      var mounds    = (models.MoleMound       || []).filter(function(r){ return r.project_id === pid; });
      var repellers = (models.RepellerDevice  || []).filter(function(r){ return r.project_id === pid; });
      var floods    = (models.FloodPoint      || []).filter(function(r){ return r.project_id === pid; });
      var barriers  = (models.BarrierSection  || []).filter(function(r){ return r.project_id === pid; });

      var c = configs[0] || null;

      var now = new Date();
      function pad(n) { return n < 10 ? '0' + n : '' + n; }
      var date = pad(now.getDate()) + '. ' + pad(now.getMonth() + 1) + '. ' + now.getFullYear();
      var validD = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
      var validUntil = pad(validD.getDate()) + '. ' + pad(validD.getMonth() + 1) + '. ' + validD.getFullYear();
      var quoteNum = 'HYDRO-' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate())
                    + '-' + ('00' + (now.getHours() * 60 + now.getMinutes())).slice(-3);

      if (!c) {
        return { noConfig: true, quoteNumber: quoteNum, date: date, validUntil: validUntil };
      }

      var totalArea = 0;
      for (var i = 0; i < zones.length; i++) {
        var zIds = zones[i].regionGeometryIds || [];
        for (var k = 0; k < zIds.length; k++) {
          var zg = geo(zIds[k]);
          if (zg) totalArea += compute.geometryArea(zg) / 1000000;
        }
      }
      var totalBarrier = 0;
      for (var i = 0; i < barriers.length; i++) {
        var bIds = barriers[i].lineGeometryIds || [];
        for (var k = 0; k < bIds.length; k++) {
          var bg = geo(bIds[k]);
          if (bg) totalBarrier += compute.geometryLength(bg) / 1000;
        }
      }

      var REPELLER_PRICES = {
        'solar-sonic': 350, 'battery-sonic': 220, 'vibration-stake': 180,
        'force-field-emitter': 4900, 'turbolaser': 12500, 'ion-pulse': 7800
      };
      var REPELLER_NAMES  = {
        'solar-sonic':         'SolarMole 300 -- solarni sonicky plasic',
        'battery-sonic':       'VibratMole Duo -- bateriovy sonicky plasic',
        'vibration-stake':     'EcoVib -- vibracni kolik',
        'force-field-emitter': 'NovaStar SFE-1 -- generator siloveho pole',
        'turbolaser':          'TurboLazer Krtex-IX -- turbolaserova baterie',
        'ion-pulse':           'Ionovy Pulzator IM-6 -- ionovy kanon'
      };
      var FLOOD_PRICES  = {
        'auto': 2890, 'manual': 890,
        'plasma-torpedo': 8500, 'tractor-beam': 15900
      };
      var FLOOD_NAMES   = {
        'auto':           'HydroMole Auto -- automaticky zaplavovac krtincu',
        'manual':         'FloodKit -- rucni zaplavovaci sada',
        'plasma-torpedo': 'AquaPlasma T-5 -- plazmovy torpedomed krtincu',
        'tractor-beam':   'TraktorKrtek 3000 -- traktorovy svazek'
      };
      var BARRIER_PRICES = {
        'pe-net': 45, 'galvanized-net': 89,
        'force-barrier': 890, 'transphasic-mesh': 250, 'duranium-net': 180
      };
      var BARRIER_NAMES  = {
        'pe-net':           'PE barierova sit 100 cm',
        'galvanized-net':   'Pozinkovana barierova sit 50 cm',
        'force-barrier':    'NovaStar FBG-3 -- fazova barierova baterie',
        'transphasic-mesh': 'TransMesh ST-IV -- transphasicka sit',
        'duranium-net':     'DuraNorm -- duraniumova sit'
      };

      var subtotal = 0;
      var repellerLines = [];
      var floodLines    = [];
      var barrierLines  = [];
      var serviceLines  = [];

      function fmt(n) {
        return n.toLocaleString ? n.toLocaleString('cs-CZ') : String(n);
      }
      function addLine(arr, item, qty, unit, unitPrice) {
        if (qty <= 0) return;
        var price = qty * unitPrice;
        subtotal += price;
        arr.push({ item: item, qty: qty, unit: unit,
                   unitPrice: fmt(unitPrice), price: fmt(price) });
      }

      if (c.useRepellers) {
        var rqty = c.repellerCount > 0 ? c.repellerCount : repellers.length;
        addLine(repellerLines, REPELLER_NAMES[c.repellerModel] || 'Plasic', rqty, 'ks',
                REPELLER_PRICES[c.repellerModel] || 350);
      }
      if (c.useFlooding) {
        var fqty = c.floodPointCount > 0 ? c.floodPointCount : floods.length;
        addLine(floodLines, FLOOD_NAMES[c.floodingType] || 'Zaplavovac', fqty, 'ks',
                FLOOD_PRICES[c.floodingType] || 2890);
      }
      if (c.useBarrier) {
        var blen = c.barrierLength > 0 ? c.barrierLength : totalBarrier;
        addLine(barrierLines, BARRIER_NAMES[c.barrierType] || 'Sit', blen, 'bm',
                BARRIER_PRICES[c.barrierType] || 45);
        if (c.includeInstallation && blen > 0) {
          addLine(barrierLines, 'Instalace barierove site', blen, 'bm', 180);
        }
      }
      if (c.includeInstallation) {
        addLine(serviceLines, 'Profesionalni instalace a uvedeni do provozu', 1, 'navsteva', 1200);
      }
      if (c.includeAnnualService) {
        addLine(serviceLines, 'Rocni servisni smlouva', 1, 'rok', 3600);
      }

      var vat   = Math.round(subtotal * 0.21);
      var total = subtotal + vat;

      return {
        noConfig:        false,
        quoteNumber:     quoteNum,
        date:            date,
        validUntil:      validUntil,
        clientName:      c.clientName || 'Zakaznik',
        propertyAddress: c.propertyAddress || 'Adresa neuvedena',
        gardenAreaStr:   (c.gardenArea > 0 ? c.gardenArea : totalArea).toFixed(1),
        moundCount:      c.moleMoundCount > 0 ? c.moleMoundCount : mounds.length,
        deviceCount:     repellers.length + floods.length,
        repellerLines:   repellerLines,
        floodLines:      floodLines,
        barrierLines:    barrierLines,
        serviceLines:    serviceLines,
        subtotalStr:     fmt(subtotal),
        vatStr:          fmt(vat),
        totalStr:        fmt(total)
      };

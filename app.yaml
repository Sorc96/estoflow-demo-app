            <ellipse cx="49" cy="24" rx="6" ry="9" fill="#78350f"/>
            <circle cx="30" cy="36" r="19" fill="#92400e"/>
            <path d="M13 26 Q13 7 30 7 Q47 7 47 26 Z" fill="#ea580c"/>
